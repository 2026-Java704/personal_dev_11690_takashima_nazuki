<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<link rel="stylesheet" type="text/css" href="/css/style.css">
</head>
<body>
	<header>
		<h1>食事登録</h1>
	</header>
	<main>
		<form action="/dishes/add" method="post">
			<table border="1">
				<tr>
					<th>
						主食
					</th>
					<td>
						<select name="stapleFood" required>
							<option value="" disabled selected>選択してください</option>
							<option th:each="i:${#numbers.sequence(0,10)}" th:value="${i}" th:text="${i} + 'つ'" th:selected="${i == stapleFood}">
							</option>
						</select>
					</td>
				</tr>
				<tr>
					<th>
						副菜
					</th>
					<td>
						<select name="sideDish" required>
							<option value="" disabled selected>選択してください</option>
							<option th:each="i:${#numbers.sequence(0,10)}" th:value="${i}" th:text="${i} + 'つ'" th:selected="${i == sideDish}">
							</option>
						</select>
					</td>
				</tr>
				<tr>
					<th>
						主菜
					</th>
					<td>
						<select name="mainDish" required>
							<option value="" disabled selected>選択してください</option>
							<option th:each="i:${#numbers.sequence(0,10)}" th:value="${i}" th:text="${i} + 'つ'" th:selected="${i == mainDish}">
							</option>
						</select>
					</td>
				</tr>
				<tr>
					<th>
						牛乳・乳製品
					</th>
					<td>
						<select name="milkDish" required>
							<option value="" disabled selected>選択してください</option>
							<option th:each="i:${#numbers.sequence(0,10)}" th:value="${i}" th:text="${i} + 'つ'" th:selected="${i ==milkDish}">
							</option>
						</select>
					</td>
				</tr>
				<tr>
					<th>
						果物
					</th>
					<td>
						<select name="fruitCount" required>
							<option value="" disabled selected>選択してください</option>
							<option th:each="i:${#numbers.sequence(0,10)}" th:value="${i}" th:text="${i} + 'つ'" th:selected="${i ==fruitCoount}">
							</option>
						</select>
					</td>
				</tr>
			</table>
		<button type="submit">登録</button><br>

			<button formmethod="get" formaction="/dishes/memo">詳細登録</button>
	</form>
	</main>	

</body>
</html>
