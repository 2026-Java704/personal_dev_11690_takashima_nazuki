<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>登録内容一覧</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<h1>登録内容一覧</h1>
<header>
<h1>登録内容一覧</h1>
</header>
<table border="1">
		<tr>
			<th>日付</th>
			<th>主菜</th>
			<th>副菜</th>
			<th>主食</th>
			<th>乳製品</th>
			<th>果物</th>
			<th>メモ</th>
			<th>採点</th>
			<th>更新</th>			
			<th>更新</th>
		</tr>
		<tr th:each="record:${resultList}">
			<td th:text ="${record.stapleFood}"></td>
			<td th:text ="${record.sideDish}"></td>
			<td th:text ="${record.mainDish}"></td>
			<td th:text ="${record.milkDish}"></td>
			<td th:text ="${record.fruitcount}"></td>
			<td th:text ="${record.detaiMemo}"></td>
			<td th:text ="${record.achivment}"></td>
			
		</tr>


		
	</table>
	
	
	

	<a href="/dishes/add">新規内容登録</a>




	<a href="/logout">ログアウト</a>
</body>
</html>
		<script>
			var today=new Date();
			//年・月・日・曜日を取得
			//var year = today.getFullYear();
			var month = today.getMonth()+1;
			var week = today.getDay();
		    var day = today.getDate();
			var week_ja= new Array("日","月","火","水","木","金","土");

			//年・月・日・曜日を書き出す
			document.write(month+"月"+day+"日 "+week_ja[week]+"曜日");
		</script>
