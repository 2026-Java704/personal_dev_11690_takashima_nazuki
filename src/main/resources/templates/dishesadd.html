<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<link rel="stylesheet" type="text/css" href="/css/style.css">
</head>
<body>
<h3>登録</h3>

<p>
	<div id="rouded-box">
	<p>
		主食
		<select name="stapleFood">
				<option th:each="i:${#numbers.sequence(0,10)}"
				th:value="${i}" th:text="${i}"></option>
			</select>
	</p>
	</div>
	
	<div id="rouded-box">
	<p>
		副菜
		<select name="sideDish">
				<option th:each="i:${#numbers.sequence(0,10)}"
				th:value="${i}" th:text="${i}"></option>
			</select>
	</p>
	</div>
		
	<div id="rouded-box">
	<p>
		主菜
		<select name="mainDish">
				<option th:each="i:${#numbers.sequence(0,10)}"
				th:value="${i}" th:text="${i}"></option>
			</select>
	</p>
	</div>
		
	<div id="rouded-box">
	<p>
		牛乳・乳製品
		<select name="milkDish">
				<option th:each="i:${#numbers.sequence(0,10)}"
				th:value="${i}" th:text="${i}"></option>
			</select>
	</p>
	</div>
	
	<div id="rouded-box">
	<p>
		果物
		<select name="fruitCount">
				<option th:each="i:${#numbers.sequence(0,10)}"
				th:value="${i}" th:text="${i}"></option>
			</select>
	</p>
	</div>
	
</p>

<button>詳細登録</button>

</body>
</html>
