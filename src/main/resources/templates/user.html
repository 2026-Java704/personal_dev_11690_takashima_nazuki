<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>新規登録</title>
<link rel="stylesheet" type="text/css" href="/css/aaa.css">
</head>
<body>
	<div class="dish-container">
	<header><h1>新規登録</h1></header>
	<main>
		<div class="user">
	<form action="/users/add" method="post">
		
		<ul th:if="${errorList}" class="error">
			<li th:each="error:${errorList}" th:text="${error}"></li>
		</ul>
		
				<lavel for="email">メールアドレス</lavel><br>
				<input type="text" name="email" th:value="${email}"><br>
				
				<lavel for="name">名前</lavel><br>
				<input type="text" name="name" th:value="${name}"><br>
			
				<lavel for="password">パスワード</lavel><br>
				<input type="text" name="password"><br>
				
				<lavel for="age">年齢</lavel><br>
				<input type="text" name="age" th:value="${age}"><br>
			
				<lavel for="gender">性別</lavel><br>
					<div class="selectbox-5">				<select name="gender">
									<option value="" selected disabled> 選択してください</option>
									<option value="1">男性</option>
									<option value="2">女性</option>
								</select></div>
				
			
	
	<div class="main"><button>登録</button></div>
	</form>
	<a href="/login">ログイン画面へ戻る</a>
	</div>
</main>
</div>
</body>
</html>
